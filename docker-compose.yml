services:
  web:
    build: .
    container_name: django-web
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - ./media:/app/media
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    depends_on:
      - mediamtx

  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: mediamtx
    restart: always
    ports:
      - "8554:8554"
      - "8888:8888"
    env_file:
      - .env
    volumes:
      - .:/app
    command: /app/mediamtx.yml